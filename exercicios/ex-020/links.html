<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

         /* 
         # = ID
         . = CLASS
         : = PSEUDO-CLASS
         :: = PSEUDO=CLASS
         > = clildren
         */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        
        a {
            color: rgb(255, 0, 0);
            text-decoration: none;
            font-weight: bolder;
        }

        a:visited {
             color: darkred;
        }
        
        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: yellow;
        }

    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório do GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Cursoemvideo</a></li>
    </ul>
</body>
</html>
