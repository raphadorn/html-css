<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedado localmente</h1>
    <p>Este video está hospedado no meu próprio servidor</p>

    <video  width="500" height="300" autoplay controls loop>
          <source src="midia/Meu-Video.mp4" type="video/mp4" 

          <source src="midia/Meu-Video(2).mov" type="video/quicktime" >

          <p>Seu navegador não suporta a reprodução deste vídeo.</p>
          <h1>Inserindo vídeos no Youtube</h1>
    </video>
    <h1>Inserindo vídeos do YouTube</h1>
        <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/nCKwUB8EVbc?si=atdAAFwEuDVrXbE8" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
