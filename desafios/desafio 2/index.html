<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>icon</title>
    <!-- favicon (ícone da aba) deve ser definido com uma tag link dentro do head -->
    <link rel="icon" href="favicon (2).ico" type="image/x-icon">
</head>
<body>
    <h1>Colocando o ICON</h1>

    <p>Inserir imagens em HTML é muito simples.</p>

    <!-- imagem normal, não é necessário rel ou type aqui -->
     
    <img src="favicon (2).ico" alt="favicon">


</body>
</html>
